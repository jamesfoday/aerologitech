{% load static %}
<div class="cards">
  {% if offers %}
    {% for o in offers %}
      <article class="card">
        <div class="card__media">
          {% if o.image %}
            <img src="{{ o.image.url }}" alt="{{ o.title }}">
          {% else %}
            <img src="{% static 'images/service-placeholder.jpg' %}" alt="{{ o.title }}">
          {% endif %}
          <a class="card__view" href="{% url 'explore:go_offer' o.pk %}">Go</a>
        </div>
        <div class="card__body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="badge bg-success text-capitalize">{{ o.offer_type }}</span>
            <small class="text-muted">{{ o.provider }}</small>
          </div>
          <h3 class="card__name">{{ o.title }}</h3>
          <p class="card__desc">{{ o.teaser|truncatechars:110 }}</p>
          <div class="d-flex justify-content-between align-items-center mt-2">
            <small class="text-muted">{{ o.region }}</small>
            <a class="btn-link" href="{% url 'explore:go_offer' o.pk %}">Book</a>
          </div>
        </div>
      </article>
    {% endfor %}
  {% else %}
    <div class="empty">No offers yet.</div>
  {% endif %}
</div>
